services:
  meal-planner:
    build: .
    container_name: meal-planner
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    environment:
      - TZ=Europe/Paris
      - GROQ_API_KEY=${GROQ_API_KEY}
    ports:
      - "5174:3000"
    networks:
      - proxy_net
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3000/ || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

networks:
  proxy_net:
    external: true
